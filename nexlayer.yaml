application:
  name: hatchet
  pods:
  - name: app
    image: ghcr.io/hatchet-dev/hatchet/hatchet-lite:latest
    path: /
    servicePorts:
    - 8888
    vars:
      DATABASE_URL: "postgresql://hatchet:${POSTGRES_PASSWORD}@hatchet-postgres.pod:5432/hatchet?sslmode=disable"
      SERVER_MSGQUEUE_KIND: "postgres"
      SERVER_URL: "https://relaxed-weasel-hatchet.cloud.nexlayer.ai"
      SERVER_AUTH_COOKIE_DOMAIN: "relaxed-weasel-hatchet.cloud.nexlayer.ai"
      SERVER_AUTH_COOKIE_INSECURE: "f"
      SERVER_GRPC_BIND_ADDRESS: "0.0.0.0"
      SERVER_GRPC_INSECURE: "t"
      SERVER_GRPC_BROADCAST_ADDRESS: "relaxed-weasel-hatchet.cloud.nexlayer.ai:443"
      SERVER_GRPC_PORT: "7077"
      SERVER_AUTH_SET_EMAIL_VERIFIED: "t"
      SERVER_DEFAULT_ENGINE_VERSION: "V1"
  - name: hatchet-postgres
    image: mirror.gcr.io/library/postgres:16-alpine
    servicePorts:
    - 5432
    vars:
      POSTGRES_DB: hatchet
      POSTGRES_USER: hatchet
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
    - name: hatchet-db
      mountPath: /var/lib/postgresql/data
      size: 5Gi
