application:
  name: hatchet
  pods:
  - name: app
    image: ghcr.io/hatchet-dev/hatchet/hatchet-lite:latest
    path: /
    servicePorts:
    - 8080
    vars:
      DATABASE_URL: "postgresql://hatchet:hatchet@postgres.pod:5432/hatchet"
      SERVER_TASKQUEUE_RABBITMQ_URL: "amqp://guest:guest@rabbitmq.pod:5672"
      SERVER_URL: "https://relaxed-weasel-hatchet.cloud.nexlayer.ai"
      SERVER_AUTH_COOKIE_DOMAIN: "relaxed-weasel-hatchet.cloud.nexlayer.ai"
      SERVER_AUTH_COOKIE_INSECURE: "false"
      SERVER_ENCRYPTION_JWT_PRIVATE_KEY: "a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2"
      SERVER_ENCRYPTION_JWT_PUBLIC_KEY: "a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2"
      SERVER_ENCRYPTION_MASTER_KEYSET: "a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4"
    volumes:
    - name: hatchet-certs
      mountPath: /hatchet/certs
      size: 1Gi
  - name: postgres
    image: mirror.gcr.io/library/postgres:16-alpine
    servicePorts:
    - 5432
    vars:
      POSTGRES_DB: hatchet
      POSTGRES_USER: hatchet
      POSTGRES_PASSWORD: hatchet
    volumes:
    - name: hatchet-db
      mountPath: /var/lib/postgresql/data
      size: 5Gi
